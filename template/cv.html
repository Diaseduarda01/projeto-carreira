<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>{{titulo}}</title>
<style>
{{styles}}
</style>
</head>
<body>
<div class="page">

  <header>
    <h1>{{nome}}</h1>
    <div class="role">{{role}}</div>
    <div class="contact">{{contato}}</div>
    <div class="links">
{{links}}
    </div>
  </header>

  <section>
    <h2>SOBRE MIM</h2>
    <p class="about">
      {{sobre}}
    </p>
  </section>

  <section>
    <h2>EXPERIÊNCIA PROFISSIONAL</h2>
{{experiencias}}
  </section>

  <section>
    <h2>EDUCAÇÃO</h2>
{{educacao}}

    <div class="skills-block">
      <span class="label">Habilidades e conhecimentos</span>
      <ul>
{{habilidades}}
      </ul>
    </div>
  </section>

  <section>
    <h2>CERTIFICAÇÃO</h2>
{{certificacoes}}
  </section>

</div>
</body>
</html>
